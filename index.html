<!DOCTYPE html>
<html>
<head>
  <title>Compteur en direct</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      margin-top: 100px;
    }

    .count {
      font-size: 120px;
      font-weight: bold;
      color: #00ffcc;
    }
  </style>
</head>

<body>

<h1>Compteur en direct</h1>
<div class="count" id="count">0</div>

<script>
const API_URL = "TON_URL_APPS_SCRIPT";

async function update() {
  try {
    let res = await fetch(API_URL);
    let text = await res.text();

    document.getElementById("count").innerText = text;
  } catch (e) {
    document.getElementById("count").innerText = "Erreur";
  }
}

update();
setInterval(update, 2000);
</script>

</body>
</html>
