<!DOCTYPE html>
<html>
<body>

<h1>Compteur</h1>
<div id="count">chargement...</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw3wQmHY7RBEEWIGcGigxXHrsBzowEBvulWlLGLEYFUWghaEx9btdSDVEhgnQ44DXsz/exec";

fetch(API_URL)
  .then(res => res.text())
  .then(data => {
    document.getElementById("count").innerText = data;
  })
  .catch(err => {
    document.getElementById("count").innerText = "Erreur";
    console.log(err);
  });

</script>

</body>
</html>
