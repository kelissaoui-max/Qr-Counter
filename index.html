<!DOCTYPE html>
<html>
<head>
  <title>Compteur en direct</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      margin-top: 100px;
    }

    .count {
      font-size: 120px;
      font-weight: bold;
      color: #00ffcc;
    }
  </style>
</head>

<body>

<h1>Participants en direct</h1>
<div class="count" id="count">0</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzbZuKNFC6x4xfw4Vh_y80ER1hUVND6X5MUDYAFInxw-CMsDA2TLGh4WBuYbBrV6Ei8/exec";

// récupérer le compteur
async function update() {
  try {
    let res = await fetch(API_URL);
    let text = await res.text();
    document.getElementById("count").innerText = text;
  } catch {
    document.getElementById("count").innerText = "Erreur";
  }
}

// lancer + refresh
update();
setInterval(update, 2000);
</script>

</body>
</html>
